name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Install Linux linker tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Smoke build simple project
        run: cargo run -p tong -- build examples/simple-rust-project

      - name: Smoke plan path dependency project
        run: cargo run -p tong -- plan examples/path-dep-project

      - name: Smoke build script project
        run: cargo run -p tong -- build examples/build-script-project

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        uses: taiki-e/install-action@mdbook

      - name: Build book
        run: mdbook build book

  full-validation:
    name: Weekly Full Validation
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch CLI mini sources
        run: cargo run -p tong -- fetch examples/cli-mini

      - name: Build CLI mini
        run: cargo run -p tong -- build examples/cli-mini
